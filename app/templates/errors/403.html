{% extends "base.html" %}

{% block title %}Acceso Denegado - Art Platform{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1">403</h1>
    <h2>Acceso Denegado</h2>
    <p class="lead">No tienes permisos para acceder a esta página.</p>
    {% if current_user.is_authenticated %}
    <a href="javascript:history.back()" class="btn btn-secondary">Volver</a>
    {% else %}
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary me-2">Iniciar Sesión</a>
    <a href="{{ url_for('public.home') }}" class="btn btn-secondary">Ir al Inicio</a>
    {% endif %}
</div>
{% endblock %}
