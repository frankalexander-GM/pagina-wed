{% extends "base.html" %}

{% block title %}Editar Obra - WindMills Art{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">Editar Obra</h3>
                        <a href="{{ url_for('artista.obras') }}" class="btn btn-sm btn-outline-secondary">Volver</a>
                    </div>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('artista.editar_obra', obra_id=obra.id_obra) }}">
                        <div class="mb-3">
                            <label for="titulo" class="form-label">Título de la Obra *</label>
                            <input type="text" class="form-control" id="titulo" name="titulo" value="{{ obra.titulo }}" required>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="categoria" class="form-label">Categoría</label>
                                <select class="form-select" id="categoria" name="categoria">
                                    <option value="">Selecciona una categoría...</option>
                                    {% for cat in categorias %}
                                        <option value="{{ cat.id_categoria }}" {% if obra.id_categoria == cat.id_categoria %}selected{% endif %}>{{ cat.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="tecnica" class="form-label">Técnica</label>
                                <input type="text" class="form-control" id="tecnica" name="tecnica" value="{{ obra.tecnica or '' }}">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" name="descripcion" rows="5">{{ obra.descripcion or '' }}</textarea>
                        </div>
                        
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" id="visible" name="visible" {% if obra.visible %}checked{% endif %}>
                            <label class="form-check-label" for="visible">Hacer visible públicamente</label>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('artista.obras') }}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
