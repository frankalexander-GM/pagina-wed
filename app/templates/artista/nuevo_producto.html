{% extends "base.html" %}

{% block title %}Nuevo Producto - WindMills Art{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white pt-3 pb-2 border-bottom-0">
                    <h3 class="mb-0">Agregar Nuevo Producto</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('artista.nuevo_producto') }}">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre del Producto *</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ej. Print A4 de Atardecer, Taza decorada...">
                        </div>
                        
                        <div class="mb-3">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" name="descripcion" rows="4"></textarea>
                        </div>
                        
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label for="precio" class="form-label">Precio (USD) *</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" step="0.01" class="form-control" id="precio" name="precio" required>
                                </div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="stock" class="form-label">Stock Disponible *</label>
                                <input type="number" class="form-control" id="stock" name="stock" value="1" min="0" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="imagen" class="form-label">URL de Imagen</label>
                            <input type="url" class="form-control" id="imagen" name="imagen" placeholder="https://ejemplo.com/imagen.jpg">
                            <div class="form-text">Por ahora utilizamos URLs para las imágenes de los productos.</div>
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4 border-top pt-4">
                            <a href="{{ url_for('artista.productos') }}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-5">Guardar Producto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
