{% extends "base.html" %}
{% block title %}Iniciar Sesión — Ágora Art{% endblock %}

{% block content %}
<div style="min-height:75vh;display:flex;align-items:center;justify-content:center;background:#FAFAFA;padding:48px 24px;">
    <div style="width:100%;max-width:400px;">
        <div style="text-align:center;margin-bottom:32px;">
            <div style="width:48px;height:48px;background:#1769FF;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                <svg viewBox="0 0 20 20" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 2 L17 17 H13.5 L12 13.5 H8 L6.5 17 H3 Z M10 6.5 L9 10.5 H11 Z" fill="white"/>
                </svg>
            </div>
            <h1 style="font-size:1.5rem;margin-bottom:4px;">Iniciar sesión</h1>
            <p style="color:#8C8C8C;font-size:14px;margin:0;">Accede a tu espacio en Ágora Art</p>
        </div>
        <div style="background:white;border:1px solid #ECECEC;border-radius:12px;padding:32px;">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div style="margin-bottom:16px;">
                    <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="tu@email.com">
                </div>
                <div style="margin-bottom:16px;">
                    <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                </div>
                <div style="margin-bottom:20px;display:flex;align-items:center;gap:8px;">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember" style="margin:0;">
                    <label for="remember" style="font-size:13px;color:#6E6E6E;">Recuérdame</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;font-size:14px;">Iniciar Sesión</button>
            </form>
        </div>
        <div style="text-align:center;margin-top:20px;">
            <p style="font-size:13px;color:#8C8C8C;">¿No tienes cuenta? <a href="{{ url_for('auth.register') }}" style="color:#1769FF;font-weight:600;">Regístrate</a></p>
        </div>
    </div>
</div>
{% endblock %}
