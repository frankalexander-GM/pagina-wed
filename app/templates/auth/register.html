{% extends "base.html" %}
{% block title %}Crear Cuenta — Ágora Art{% endblock %}

{% block content %}
<div style="min-height:75vh;display:flex;align-items:center;justify-content:center;background:#FAFAFA;padding:48px 24px;">
    <div style="width:100%;max-width:520px;">
        <div style="text-align:center;margin-bottom:32px;">
            <div style="width:48px;height:48px;background:#1769FF;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                <svg viewBox="0 0 20 20" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 2 L17 17 H13.5 L12 13.5 H8 L6.5 17 H3 Z M10 6.5 L9 10.5 H11 Z" fill="white"/>
                </svg>
            </div>
            <h1 style="font-size:1.5rem;margin-bottom:4px;">Crear cuenta</h1>
            <p style="color:#8C8C8C;font-size:14px;margin:0;">Únete a la comunidad de Ágora Art</p>
        </div>
        <div style="background:white;border:1px solid #ECECEC;border-radius:12px;padding:32px;">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                    <div>
                        <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Nombre</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                    </div>
                    <div>
                        <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                </div>
                <div style="margin-bottom:16px;">
                    <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                    <div>
                        <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                        <div class="form-text">Mínimo 6 caracteres</div>
                    </div>
                    <div>
                        <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Confirmar</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                </div>
                <div style="margin-bottom:16px;">
                    <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Tipo de cuenta</label>
                    <select class="form-select" id="rol" name="rol" required>
                        <option value="">Selecciona tu rol</option>
                        <option value="cliente">Cliente — Comprar y seguir artistas</option>
                        <option value="artista">Artista — Vender y exhibir obra</option>
                    </select>
                </div>
                <div style="margin-bottom:20px;">
                    <label style="display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#4A4A4A;">Biografía <span style="color:#B0B0B0;">(opcional)</span></label>
                    <textarea class="form-control" id="biografia" name="biografia" rows="2" placeholder="Cuéntanos sobre ti..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;font-size:14px;">Crear Cuenta</button>
            </form>
        </div>
        <div style="text-align:center;margin-top:20px;">
            <p style="font-size:13px;color:#8C8C8C;">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" style="color:#1769FF;font-weight:600;">Inicia sesión</a></p>
        </div>
    </div>
</div>

{% block scripts %}
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    if (document.getElementById('password').value !== document.getElementById('confirm_password').value) {
        e.preventDefault();
        alert('Las contraseñas no coinciden');
    }
});
</script>
{% endblock %}
{% endblock %}
