{% extends "base.html" %}

{% block title %}Editar Perfil — WindMills Art{% endblock %}

{% block content %}
<div class="section">
    <div class="container" style="max-width: 640px;">
        <h2 class="section-title">Editar Perfil</h2>
        
        <div class="card">
            <form method="POST" action="{{ url_for('auth.editar_perfil') }}">
                <div class="form-group">
                    <label class="form-label" for="nombre">Nombre completo</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" 
                           value="{{ current_user.nombre }}" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username" 
                           value="{{ current_user.username }}" required minlength="3">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">Correo electrónico</label>
                    <input type="email" class="form-control" id="email" name="email" 
                           value="{{ current_user.email }}" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="biografia">Biografía</label>
                    <textarea class="form-control" id="biografia" name="biografia" rows="4" 
                              placeholder="Cuéntanos sobre ti...">{{ current_user.biografia or '' }}</textarea>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar cambios
                    </button>
                    <a href="{{ url_for('auth.perfil') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
