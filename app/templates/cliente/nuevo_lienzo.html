{% extends "base.html" %}

{% block title %}Nuevo Lienzo - Ágora Art{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Crear Nuevo Lienzo</h2>
                    <p class="text-muted text-center mb-4">Dale un nombre a tu tablero de inspiración para empezar a organizar tus obras favoritas.</p>
                    
                    <form method="POST" action="{{ url_for('cliente.nuevo_lienzo') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-4">
                            <label for="nombre" class="form-label fw-bold">Nombre del Lienzo</label>
                            <input type="text" class="form-control form-control-lg rounded-pill" id="nombre" name="nombre" placeholder="Ej: Inspiración para mi sala" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill">Crear Lienzo</button>
                            <a href="{{ url_for('cliente.lienzos') }}" class="btn btn-link text-muted">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
