{% extends "layout.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<div class="dashboard-container">
    
    <aside class="sidebar" id="sidebar">
        
        <div class="toggle-menu" id="toggle-btn">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>

        <div class="sidebar-header">
            <div class="logo-circle">🎨</div>
            <div class="header-text">
                <h2 class="logo-title">Mi Taller</h2>
                <p class="logo-subtitle">Frank Art</p>
            </div>
        </div>

        <nav class="nav-menu">
            
            <div class="menu-group">
                <span class="group-title">GENERAL</span>
                <ul>
                    <li class="active"><span class="icon">📥</span><span class="text">Inbox</span></li>
                    <li><span class="icon">⭐</span><span class="text">Favourite</span></li>
                    <li><span class="icon">📩</span><span class="text">Sent</span></li>
                    <li><span class="icon">📝</span><span class="text">Draft</span></li>
                    <li><span class="icon">📦</span><span class="text">Archive</span></li>
                    <li><span class="icon">🗑️</span><span class="text">Trash</span></li>
                </ul>
            </div>

            <div class="menu-group">
                <span class="group-title">ADMIN</span>
                <ul>
                    <li><span class="icon">👤</span><span class="text">Profile</span></li>
                    <li><span class="icon">⚙️</span><span class="text">Settings</span></li>
                    <li><span class="icon">🚪</span><span class="text">Logout</span></li>
                </ul>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="welcome-banner">
            <h1>Bienvenido al Taller</h1>
            <p>Tu espacio creativo para bordado y diseño de bolsos.</p>
        </div>
    </main>

</div>

<script>
    const btn = document.getElementById('toggle-btn');
    const sidebar = document.getElementById('sidebar');

    btn.addEventListener('click', () => {
        // Si la pantalla es pequeña (Móvil)
        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('active-mobile');
        } else {
            // Si es pantalla grande (PC)
            sidebar.classList.toggle('collapsed');
        }
        // Animación de la hamburguesa a X
        btn.classList.toggle('active');
    });
</script>
{% endblock %}
